<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mein Depot</title>
<style>
  * { box-sizing: border-box; }
  body { margin:0; min-height:100vh; background:#0f1117; color:#e8eaf0; font-family:'Inter','Segoe UI',sans-serif; padding-bottom:60px; }
  input[type=text], input[type=date] { background:#0f1117; border:1px solid #2a2f3e; border-radius:8px; padding:9px 12px; color:#e8eaf0; font-size:14px; outline:none; color-scheme:dark; width:100%; }
  input.error { border-color:#ef4444 !important; }
  .header { background:linear-gradient(135deg,#1a1f2e 0%,#141824 100%); border-bottom:1px solid #2a2f3e; padding:28px 32px 20px; }
  .header-inner { max-width:1100px; margin:0 auto; }
  .title-row { display:flex; align-items:center; gap:12px; margin-bottom:4px; }
  h1 { margin:0; font-size:24px; font-weight:800; letter-spacing:-0.5px; color:#f0f2f8; }
  .subtitle { margin:0; color:#6b7280; font-size:13px; }
  .wrap { max-width:1100px; margin:0 auto; padding:24px 32px 0; }
  .summary { background:#1a1f2e; border:1px solid #2a2f3e; border-radius:14px; overflow:hidden; margin-bottom:28px; }
  .summary table { width:100%; border-collapse:collapse; }
  .summary thead tr { background:#131720; border-bottom:1px solid #2a2f3e; }
  .summary th { padding:10px 14px; text-align:left; font-size:11px; color:#6b7280; text-transform:uppercase; letter-spacing:0.8px; font-weight:600; }
  .summary th.r { text-align:right; }
  .summary td { padding:11px 14px; font-size:13px; border-bottom:1px solid #1e2332; }
  .summary td.r { text-align:right; }
  .summary tr:last-child td { border-bottom:none; }
  .summary .total-row td { border-top:2px solid #2a2f3e; font-weight:700; font-size:14px; background:#131720; }
  .summary tr.clickable { cursor:pointer; }
  .summary tr.clickable:hover td { background:#1e2332; }
  .summary tr.clickable.sel td { background:#1a2235; }
  .add-panel { background:#1a1f2e; border:1px solid #2a2f3e; border-radius:14px; padding:20px 24px; margin-bottom:28px; }
  .add-panel h2 { margin:0 0 16px; font-size:14px; font-weight:700; color:#94a3b8; text-transform:uppercase; letter-spacing:1px; }
  .form-grid { display:grid; grid-template-columns:2fr 1fr 1fr 1.3fr 1.3fr auto; gap:12px; align-items:end; }
  .field label { display:block; font-size:11px; color:#6b7280; margin-bottom:5px; text-transform:uppercase; letter-spacing:0.8px; }
  .err { color:#ef4444; font-size:11px; margin-top:3px; min-height:16px; }
  .btn-primary { background:linear-gradient(135deg,#3b82f6,#2563eb); border:none; border-radius:8px; padding:10px 20px; color:#fff; font-weight:700; font-size:14px; cursor:pointer; white-space:nowrap; }
  .btn-blue { background:#1e2a40; border:1px solid #3b82f644; border-radius:6px; padding:6px 12px; color:#60a5fa; font-size:12px; cursor:pointer; font-weight:600; }
  .btn-green { background:#1e2d20; border:1px solid #22c55e44; border-radius:6px; padding:6px 12px; color:#22c55e; font-size:12px; cursor:pointer; font-weight:600; }
  .btn-red { background:#2d1e1e; border:1px solid #ef444444; border-radius:6px; padding:6px 12px; color:#ef4444; font-size:12px; cursor:pointer; font-weight:600; }
  .btn-sm-confirm { background:linear-gradient(135deg,#22c55e,#16a34a); border:none; border-radius:6px; padding:8px 16px; color:#fff; font-weight:700; font-size:13px; cursor:pointer; }
  .btn-sm-confirm.blue { background:linear-gradient(135deg,#3b82f6,#2563eb); }
  .tabs { display:flex; gap:4px; margin-bottom:20px; background:#1a1f2e; border:1px solid #2a2f3e; border-radius:10px; padding:4px; width:fit-content; }
  .tab-btn { background:transparent; border:none; border-radius:7px; padding:8px 20px; color:#6b7280; font-weight:600; font-size:14px; cursor:pointer; }
  .tab-btn.active { background:#3b82f6; color:#fff; }
  .list-panel { background:#1a1f2e; border:1px solid #2a2f3e; border-radius:14px; overflow:hidden; margin-bottom:28px; }
  table { width:100%; border-collapse:collapse; }
  thead tr { background:#131720; border-bottom:1px solid #2a2f3e; }
  th { padding:11px 14px; text-align:left; font-size:11px; color:#6b7280; text-transform:uppercase; letter-spacing:0.8px; font-weight:600; }
  td { padding:13px 14px; vertical-align:middle; }
  .data-row { cursor:pointer; border-bottom:1px solid #1e2332; transition:background .1s; }
  .data-row:hover, .data-row.open { background:#1e2332; }
  .data-row:last-of-type { border-bottom:none; }
  .chevron { display:inline-block; color:#6b7280; font-size:10px; margin-right:7px; transition:transform .15s; }
  .chevron.open { transform:rotate(90deg); }
  .stock-name { font-weight:700; font-size:14px; color:#f0f2f8; display:inline; }
  .stock-wkn { font-size:11px; color:#6b7280; margin-top:2px; padding-left:17px; }
  .muted { color:#94a3b8; font-size:13px; }
  .bold { font-weight:600; color:#e8eaf0; }
  .badge { border-radius:6px; padding:2px 8px; font-weight:700; font-size:13px; display:inline-block; border:1px solid; }
  .badge.pos { color:#22c55e; background:rgba(34,197,94,0.12); border-color:#22c55e33; }
  .badge.neg { color:#ef4444; background:rgba(239,68,68,0.12); border-color:#ef444433; }
  .dim { color:#4b5563; }
  .expand-row { border-bottom:1px solid #2a2f3e; }
  .expand-row td { padding:0; }
  .expand-inner { padding:20px; background:rgba(15,17,23,0.6); }
  .expand-section { margin-bottom:18px; }
  .expand-section:last-child { margin-bottom:0; }
  .section-label { font-size:11px; color:#6b7280; text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; font-weight:600; border-bottom:1px solid #2a2f3e; padding-bottom:6px; }
  .kurs-row { display:flex; align-items:flex-end; gap:16px; flex-wrap:wrap; }
  .kurs-input-wrap { flex:0 0 150px; }
  .kurs-input-wrap label { display:block; font-size:11px; color:#6b7280; margin-bottom:5px; text-transform:uppercase; letter-spacing:0.8px; }
  .kurs-input-wrap input { width:150px; }
  .kurs-results { display:flex; gap:20px; flex-wrap:wrap; align-items:center; }
  .kurs-result-item { display:flex; flex-direction:column; gap:3px; }
  .kurs-result-item .rl { font-size:10px; color:#6b7280; text-transform:uppercase; letter-spacing:0.8px; }
  .kurs-date { font-size:10px; color:#6b7280; margin-top:4px; }
  .inline-form { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; }
  .ifield { display:flex; flex-direction:column; gap:5px; }
  .ifield label { font-size:11px; color:#6b7280; text-transform:uppercase; letter-spacing:0.8px; }
  .ifield input { width:120px; }
  .action-btns { display:flex; gap:6px; }
  .empty { padding:48px 24px; text-align:center; color:#6b7280; }
  .empty .em { font-size:40px; margin-bottom:12px; }
  .tx-toggle { display:flex; gap:4px; margin-bottom:14px; }
  .tx-toggle button { background:#0f1117; border:1px solid #2a2f3e; border-radius:7px; padding:7px 18px; color:#6b7280; font-size:13px; font-weight:600; cursor:pointer; }
  .tx-toggle button.tx-active { background:#1e2a40; border-color:#3b82f6; color:#60a5fa; }
  .tx-hint { font-size:11px; color:#6b7280; margin-top:3px; min-height:14px; }
  @media(max-width:800px) {
    .form-grid { grid-template-columns:1fr 1fr; }
    .wrap { padding-left:16px; padding-right:16px; }
    .header-inner { padding-left:16px; padding-right:16px; }
    .header { padding-left:16px; padding-right:16px; }
    table { font-size:12px; }
    td, th { padding:10px 10px; }
    .kurs-input-wrap input { width:120px; }
    .ifield input { width:100px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="title-row"><span style="font-size:26px">📈</span><h1>Mein Depot</h1></div>
    <p class="subtitle">Aktien verwalten · Kurse aktualisieren · Gewinne im Blick</p>
  </div>
</div>

<div class="wrap">
  <div id="summary"></div>

  <div id="add-panel" class="add-panel" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h2 style="margin:0">Neue Aktie</h2>
      <button onclick="toggleAddForm(false)" style="background:none;border:none;color:#6b7280;font-size:20px;cursor:pointer;line-height:1">×</button>
    </div>
    <div class="form-grid">
      <div class="field"><label>Name</label><input type="text" id="f-name" placeholder="Apple Inc." /><div class="err" id="e-name"></div></div>
      <div class="field"><label>WKN</label><input type="text" id="f-wkn" placeholder="865985" /><div class="err" id="e-wkn"></div></div>
      <div class="field"><label>Stücke</label><input type="text" id="f-stuecke" placeholder="10" /><div class="err" id="e-stuecke"></div></div>
      <div class="field"><label>Kaufpreis (€)</label><input type="text" id="f-preis" placeholder="150,00" /><div class="err" id="e-preis"></div></div>
      <div class="field"><label>Kaufdatum</label><input type="date" id="f-datum" /><div class="err" id="e-datum"></div></div>
      <button class="btn-primary" onclick="addPosition()">Hinzufügen</button>
    </div>
  </div>

  <div id="edit-panel"></div>
</div>

<script>
const KEY = "depot-v3";
let positions = [], sold = [], currentPrices = {}, expandedId = null, activeTab = "bestand";

// ---------- load & migrate ----------
function loadData() {
  try {
    // Try new key first
    let raw = localStorage.getItem(KEY);
    if (!raw) {
      // Migrate from old key
      raw = localStorage.getItem("depot-data-v1");
    }
    if (raw) {
      const d = JSON.parse(raw);
      positions = d.positions || [];
      sold = d.sold || [];
      // Migrate currentPrices: old format was {id: "123"}, new is {id: {kurs:"123", updatedAt:"..."}}
      const cp = d.currentPrices || {};
      currentPrices = {};
      for (const [k, v] of Object.entries(cp)) {
        if (typeof v === "object" && v !== null && "kurs" in v) {
          currentPrices[k] = v;
        } else if (v !== "" && v !== undefined && v !== null) {
          currentPrices[k] = { kurs: String(v), updatedAt: null };
        }
      }
    }
  } catch(e) { console.error(e); }
}

function save() {
  try { localStorage.setItem(KEY, JSON.stringify({ positions, sold, currentPrices })); } catch(e) {}
}

// ---------- helpers ----------
function num(s) { return Number(String(s).replace(",",".")); }
function cur(v) { return new Intl.NumberFormat("de-DE",{style:"currency",currency:"EUR"}).format(v); }
function pct(v) { return (v>=0?"+":"") + v.toFixed(2).replace(".",",") + " %"; }
function fdate(d) { return d ? new Date(d).toLocaleDateString("de-DE") : "—"; }
function esc(s) { const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }
function badge(v,t) { return `<span class="badge ${v>=0?"pos":"neg"}">${t}</span>`; }

function getGewinn(pos) {
  const e = currentPrices[pos.id];
  if (!e) return null;
  const k = num(e.kurs);
  if (!k || isNaN(k)) return null;
  return { kurs:k, diff:(k-pos.preis)*pos.stuecke, pct:((k-pos.preis)/pos.preis)*100, updatedAt:e.updatedAt };
}

// ---------- add form toggle ----------
function toggleAddForm(open) {
  document.getElementById("add-panel").style.display = open ? "block" : "none";
  if (open) setTimeout(() => document.getElementById("f-name").focus(), 50);
}

// ---------- add position ----------
function addPosition() {
  const n=document.getElementById("f-name").value.trim();
  const w=document.getElementById("f-wkn").value.trim();
  const st=document.getElementById("f-stuecke").value.trim();
  const pr=document.getElementById("f-preis").value.trim();
  const da=document.getElementById("f-datum").value;
  const errs={};
  if(!n) errs.name="Pflichtfeld";
  if(!w) errs.wkn="Pflichtfeld";
  if(!st||isNaN(num(st))||num(st)<=0) errs.stuecke="Positive Zahl";
  if(!pr||isNaN(num(pr))||num(pr)<=0) errs.preis="Positiver Betrag";
  if(!da) errs.datum="Pflichtfeld";
  ["name","wkn","stuecke","preis","datum"].forEach(k=>{
    document.getElementById("f-"+k).classList.toggle("error",!!errs[k]);
    document.getElementById("e-"+k).textContent=errs[k]||"";
  });
  if(Object.keys(errs).length) return;
  positions.push({ id:Date.now(), name:n, wkn:w.toUpperCase(), stuecke:num(st), preis:num(pr), datum:da });
  ["name","wkn","stuecke","preis"].forEach(k=>document.getElementById("f-"+k).value="");
  document.getElementById("f-datum").value="";
  toggleAddForm(false);
  save(); render();
}

// ---------- transaktionstyp umschalten ----------
function setTxType(id, type) {
  document.getElementById("tx-kauf-"+id).classList.toggle("tx-active", type==="kauf");
  document.getElementById("tx-vk-"+id).classList.toggle("tx-active", type==="vk");
  document.getElementById("tx-btn-"+id).dataset.type = type;
  const pos = positions.find(p=>p.id===id);
  document.getElementById("tx-stuecke-"+id).placeholder = type==="kauf" ? "5" : String(pos.stuecke);
  document.getElementById("tx-hint-"+id).textContent = type==="vk" ? `max. ${pos.stuecke} Stück` : "";
}

// ---------- transaktion buchen ----------
function doTx(id) {
  const btn = document.getElementById("tx-btn-"+id);
  const type = btn.dataset.type || "kauf";
  const pos = positions.find(p=>p.id===id);
  const st = num(document.getElementById("tx-stuecke-"+id).value);
  const pr = num(document.getElementById("tx-preis-"+id).value);
  const da = document.getElementById("tx-datum-"+id).value;
  const stEl=document.getElementById("tx-stuecke-"+id);
  const prEl=document.getElementById("tx-preis-"+id);
  const daEl=document.getElementById("tx-datum-"+id);
  let ok=true;
  const maxSt = type==="vk" ? pos.stuecke : Infinity;
  if(!st||st<=0||st>maxSt){stEl.classList.add("error");ok=false;}else stEl.classList.remove("error");
  if(!pr||pr<=0){prEl.classList.add("error");ok=false;}else prEl.classList.remove("error");
  if(!da){daEl.classList.add("error");ok=false;}else daEl.classList.remove("error");
  if(!ok) return;
  if(type==="kauf") {
    const total = pos.stuecke + st;
    const avg = (pos.preis*pos.stuecke + pr*st) / total;
    positions = positions.map(p=>p.id===id?{...p,stuecke:total,preis:Math.round(avg*10000)/10000}:p);
  } else {
    sold.push({...pos, stueckeVerkauft:st, verkaufspreis:pr, verkaufDatum:da, gewinnJe:(pr-pos.preis)*st, gewinnPct:((pr-pos.preis)/pos.preis)*100});
    if(st>=pos.stuecke) { positions=positions.filter(p=>p.id!==id); expandedId=null; }
    else { positions=positions.map(p=>p.id===id?{...p,stuecke:p.stuecke-st}:p); }
  }
  save(); render();
}

// ---------- remove ----------
function removePos(id) {
  positions = positions.filter(p=>p.id!==id);
  delete currentPrices[id];
  if(expandedId===id) expandedId=null;
  save(); render();
}

// ---------- current price ----------
function updateKurs(id, val) {
  if(val==="") { delete currentPrices[id]; }
  else { currentPrices[id] = { kurs:val, updatedAt: new Date().toISOString().slice(0,10) }; }
  save();
  renderCards();
  refreshGewinnDisplay(id);
}

function refreshGewinnDisplay(id) {
  const pos = positions.find(p=>p.id===id);
  if(!pos) return;
  const g = getGewinn(pos);
  const el = document.getElementById("gr-"+id);
  const del = document.getElementById("gd-"+id);
  if(!el) return;
  el.innerHTML = g
    ? `<div class="kurs-result-item"><span class="rl">Gewinn €</span>${badge(g.diff,cur(g.diff))}</div>
       <div class="kurs-result-item"><span class="rl">Gewinn %</span>${badge(g.pct,pct(g.pct))}</div>
       <div class="kurs-result-item"><span class="rl">Akt. Wert</span><span class="muted">${cur(g.kurs*pos.stuecke)}</span></div>`
    : `<span class="dim" style="font-size:13px;padding-top:8px">Kurs eingeben →</span>`;
  if(del) del.textContent = g && g.updatedAt ? "Stand: "+fdate(g.updatedAt) : "";
}

// ---------- render summary ----------
function renderCards() {
  const el = document.getElementById("summary");
  if (!positions.length) {
    el.innerHTML = `<div class="summary" style="padding:16px">
      <button class="btn-primary" onclick="toggleAddForm(true)" style="font-size:13px;padding:8px 16px">+ Neue Aktie aufnehmen</button>
    </div>`;
    return;
  }
  let totalInv=0, totalAkt=0;
  const rows = positions.map(pos => {
    const inv = pos.preis * pos.stuecke;
    const g = getGewinn(pos);
    const akt = g ? g.kurs * pos.stuecke : null;
    const diff = akt !== null ? akt - inv : null;
    const dp = diff !== null ? (diff / inv) * 100 : null;
    totalInv += inv;
    totalAkt += akt !== null ? akt : inv;
    const isSel = expandedId === pos.id;
    return `<tr class="clickable${isSel?" sel":""}" onclick="openFromSummary(${pos.id})">
      <td><span style="font-weight:600;color:#e8eaf0">${esc(pos.name)}</span><span style="color:#6b7280;font-size:11px;margin-left:8px">${esc(pos.wkn)}</span></td>
      <td class="r">${cur(inv)}</td>
      <td class="r">${akt!==null?cur(akt):'<span style="color:#4b5563">—</span>'}</td>
      <td class="r">${diff!==null?badge(diff,cur(diff)):'<span style="color:#4b5563">—</span>'}</td>
      <td class="r">${dp!==null?badge(dp,pct(dp)):'<span style="color:#4b5563">—</span>'}</td>
    </tr>`;
  }).join("");
  const totalDiff = totalAkt - totalInv;
  const totalDp = totalInv > 0 ? (totalDiff/totalInv)*100 : 0;
  el.innerHTML = `<div class="summary">
    <table>
      <thead><tr>
        <th>Position</th><th class="r">Investiert</th><th class="r">Akt. Wert</th><th class="r">Gewinn €</th><th class="r">Gewinn %</th>
      </tr></thead>
      <tbody>
        ${rows}
        <tr class="total-row">
          <td>Gesamtdepot</td>
          <td class="r">${cur(totalInv)}</td>
          <td class="r">${cur(totalAkt)}</td>
          <td class="r">${badge(totalDiff,cur(totalDiff))}</td>
          <td class="r">${badge(totalDp,pct(totalDp))}</td>
        </tr>
      </tbody>
    </table>
    <div style="padding:14px 16px;border-top:1px solid #2a2f3e">
      <button class="btn-primary" onclick="toggleAddForm(true)" style="font-size:13px;padding:8px 16px">+ Neue Aktie aufnehmen</button>
    </div>
  </div>`;
}

// ---------- antippen in Summary → Edit-Panel öffnen ----------
function openFromSummary(id) {
  expandedId = (expandedId === id) ? null : id;
  renderCards();
  renderEditPanel();
  if (expandedId === id) {
    setTimeout(() => {
      document.getElementById("edit-panel").scrollIntoView({ behavior:"smooth", block:"start" });
      setTimeout(() => { const el=document.getElementById("ki-"+id); if(el) el.focus(); }, 200);
    }, 30);
  }
}

// ---------- render edit-panel ----------
function renderEditPanel() {
  const panel = document.getElementById("edit-panel");
  if (!expandedId) { panel.innerHTML = ""; return; }
  const pos = positions.find(p => p.id === expandedId);
  if (!pos) { panel.innerHTML = ""; return; }

  const g = getGewinn(pos);
  const kv = (currentPrices[pos.id]||{}).kurs || "";
  const kd = (currentPrices[pos.id]||{}).updatedAt;
  const today = new Date().toISOString().slice(0,10);

  const gewinnHtml = g
    ? `<div class="kurs-result-item"><span class="rl">Gewinn €</span>${badge(g.diff,cur(g.diff))}</div>
       <div class="kurs-result-item"><span class="rl">Gewinn %</span>${badge(g.pct,pct(g.pct))}</div>
       <div class="kurs-result-item"><span class="rl">Akt. Wert</span><span class="muted">${cur(g.kurs*pos.stuecke)}</span></div>`
    : `<span class="dim" style="font-size:13px">Kurs eingeben →</span>`;

  panel.innerHTML = `<div class="list-panel" style="margin-bottom:20px">
    <div class="expand-inner">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div>
          <span style="font-weight:700;font-size:16px;color:#f0f2f8">${esc(pos.name)}</span>
          <span style="color:#6b7280;font-size:12px;margin-left:8px">${esc(pos.wkn)}</span>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="btn-red" onclick="removePos(${pos.id})">✕ Entfernen</button>
          <button onclick="openFromSummary(${pos.id})" style="background:none;border:none;color:#6b7280;font-size:22px;cursor:pointer;line-height:1">×</button>
        </div>
      </div>

      <div class="expand-section">
        <div class="section-label">📊 Aktueller Kurs</div>
        <div class="kurs-row">
          <div class="kurs-input-wrap">
            <label>Kurs (€)</label>
            <input type="text" id="ki-${pos.id}" value="${esc(kv)}" placeholder="z.B. 180,00"
              oninput="updateKurs(${pos.id},this.value)" />
            <div class="kurs-date" id="gd-${pos.id}">${kd?"Stand: "+fdate(kd):""}</div>
          </div>
          <div class="kurs-results" id="gr-${pos.id}">${gewinnHtml}</div>
        </div>
      </div>

      <div class="expand-section">
        <div class="section-label">Transaktion</div>
        <div class="tx-toggle">
          <button id="tx-kauf-${pos.id}" class="tx-active" onclick="setTxType(${pos.id},'kauf')">➕ Zukauf</button>
          <button id="tx-vk-${pos.id}" onclick="setTxType(${pos.id},'vk')">📤 Verkauf</button>
        </div>
        <div class="inline-form">
          <div class="ifield">
            <label>Stücke</label>
            <input type="text" id="tx-stuecke-${pos.id}" placeholder="5" />
            <div class="tx-hint" id="tx-hint-${pos.id}"></div>
          </div>
          <div class="ifield"><label>Kurs (€)</label><input type="text" id="tx-preis-${pos.id}" placeholder="150,00" /></div>
          <div class="ifield"><label>Datum</label><input type="date" id="tx-datum-${pos.id}" value="${today}" /></div>
          <button class="btn-sm-confirm blue" id="tx-btn-${pos.id}" data-type="kauf" onclick="doTx(${pos.id})">Buchen</button>
        </div>
      </div>
    </div>
  </div>`;
}

function render() { renderCards(); renderEditPanel(); }

loadData(); render();
</script>
</body>
</html>
