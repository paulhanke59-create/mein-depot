<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<title>Mein Depot</title>
<style>
*{box-sizing:border-box}
body{margin:0;min-height:100vh;background:#0f1117;color:#e8eaf0;font-family:'Inter','Segoe UI',sans-serif;padding-bottom:60px}
input[type=text],input[type=date]{background:#0f1117;border:1px solid #2a2f3e;border-radius:8px;padding:9px 12px;color:#e8eaf0;font-size:14px;outline:none;color-scheme:dark;width:100%}
input.error{border-color:#ef4444!important}
.header{background:linear-gradient(135deg,#1a1f2e,#141824);border-bottom:1px solid #2a2f3e;padding:20px 16px 14px}
.title-row{display:flex;align-items:center;gap:10px;margin-bottom:2px}
h1{margin:0;font-size:22px;font-weight:800;color:#f0f2f8}
.subtitle{margin:0;color:#6b7280;font-size:12px}
.wrap{max-width:1100px;margin:0 auto;padding:16px}

/* Toolbar */
.toolbar{margin-bottom:16px;background:#1a1f2e;border:1px solid #2a2f3e;border-radius:12px;overflow:hidden}
.toolbar-row{display:flex;align-items:center;gap:0;border-bottom:1px solid #2a2f3e}
.toolbar-row:last-child{border-bottom:none}
.toolbar-group{display:flex;align-items:center;gap:8px;padding:10px 14px;flex:1;flex-wrap:wrap}
.toolbar-group-label{font-size:9px;color:#6b7280;text-transform:uppercase;letter-spacing:1px;font-weight:700;padding:0 14px;min-width:52px;border-right:1px solid #2a2f3e;align-self:stretch;display:flex;align-items:center}
.btn-tool{border:none;border-radius:7px;padding:7px 13px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap}
.btn-xlsx{background:#1e2d20;color:#22c55e;border:1px solid #22c55e44}
.btn-json-imp{background:#1e2a40;color:#60a5fa;border:1px solid #3b82f644}
.btn-json-exp{background:#2a1e40;color:#a78bfa;border:1px solid #7c3aed44}
.btn-primary{background:linear-gradient(135deg,#3b82f6,#2563eb);border:none;border-radius:8px;padding:9px 18px;color:#fff;font-weight:700;font-size:13px;cursor:pointer}
.btn-sm-confirm{background:linear-gradient(135deg,#22c55e,#16a34a);border:none;border-radius:6px;padding:8px 14px;color:#fff;font-weight:700;font-size:13px;cursor:pointer}
.btn-sm-confirm.blue{background:linear-gradient(135deg,#3b82f6,#2563eb)}
.btn-red{background:#2d1e1e;border:1px solid #ef444444;border-radius:6px;padding:6px 12px;color:#ef4444;font-size:12px;cursor:pointer;font-weight:600}

/* Summary */
.summary{background:#1a1f2e;border:1px solid #2a2f3e;border-radius:14px;overflow:hidden;margin-bottom:16px}
.summary table{width:100%;border-collapse:collapse}
.summary thead tr{background:#131720;border-bottom:1px solid #2a2f3e}
.summary th{padding:9px 12px;text-align:left;font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:0.8px;font-weight:600}
.summary th.r{text-align:right}
.summary td{padding:10px 12px;font-size:13px;border-bottom:1px solid #1e2332}
.summary td.r{text-align:right}
.summary tr:last-child td{border-bottom:none}
.summary .total-row td{border-top:2px solid #2a2f3e;font-weight:700;font-size:14px;background:#131720}
.summary tr.clickable{cursor:pointer}
.summary tr.clickable:hover td,.summary tr.clickable.sel td{background:#1a2235}

/* Mobile cards */
.s-cards{display:none}
.s-card{padding:13px 14px;border-bottom:1px solid #1e2332;cursor:pointer}
.s-card.sel{background:#1a2235}
.s-card-name{font-weight:700;font-size:15px;color:#f0f2f8}
.s-card-wkn{font-size:11px;color:#6b7280;margin-left:6px}

/* Beide Datenzeilen */
.s-card-row{display:flex;gap:0;margin-top:9px;border:1px solid #2a2f3e;border-radius:8px;overflow:hidden}
.s-card-row.row2{margin-top:6px;border-color:#252b3b}

/* Einzelne Felder */
.s-card-item{flex:1;display:flex;flex-direction:column;gap:3px;padding:8px 10px;border-right:1px solid #1e2332}
.s-card-item:last-child{border-right:none}
.s-card-row .s-card-item{background:#131720}
.s-card-row.row2 .s-card-item{background:#0f1117}
.s-card-item .sl{font-size:9px;color:#6b7280;text-transform:uppercase;letter-spacing:0.5px;font-weight:600}
.s-card-item .sv{font-size:13px;color:#94a3b8;font-weight:500}
.s-card-item .sv.bold{color:#e8eaf0;font-weight:700}

.s-total{padding:12px 14px;background:#131720;border-top:2px solid #2a2f3e}
.s-total-label{font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-weight:700}
.s-total-row{display:flex;flex-wrap:wrap;gap:10px}

@media(max-width:600px){
  .summary table,.summary thead,.summary tbody{display:none}
  .s-cards{display:block}
  .inline-form{flex-direction:column}
  .ifield input{width:100%!important}
  .kurs-input-wrap input{width:100%!important}
  .kurs-row{flex-direction:column}
  .form-grid{grid-template-columns:1fr 1fr}
}
@media(min-width:601px){
  .form-grid{grid-template-columns:2fr 1fr 1fr 1.3fr 1.3fr auto}
}

/* Add form */
.add-panel{background:#1a1f2e;border:1px solid #2a2f3e;border-radius:14px;padding:16px 18px;margin-bottom:16px}
.form-grid{display:grid;gap:10px;align-items:end}
.field label{display:block;font-size:11px;color:#6b7280;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.8px}
.err{color:#ef4444;font-size:11px;margin-top:2px;min-height:14px}

/* Edit panel */
.edit-panel{background:#1a1f2e;border:1px solid #2a2f3e;border-radius:14px;overflow:hidden;margin-bottom:16px}
.expand-inner{padding:16px 18px}
.expand-section{margin-bottom:16px}
.expand-section:last-child{margin-bottom:0}
.section-label{font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-weight:600;border-bottom:1px solid #2a2f3e;padding-bottom:5px}
.kurs-row{display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap}
.kurs-input-wrap{flex:0 0 140px}
.kurs-input-wrap label{display:block;font-size:11px;color:#6b7280;margin-bottom:4px;text-transform:uppercase}
.kurs-input-wrap input{width:140px}
.kurs-results{display:flex;gap:16px;flex-wrap:wrap;align-items:center}
.kurs-result-item{display:flex;flex-direction:column;gap:2px}
.kurs-result-item .rl{font-size:10px;color:#6b7280;text-transform:uppercase}
.kurs-date{font-size:10px;color:#6b7280;margin-top:3px}
.inline-form{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end}
.ifield{display:flex;flex-direction:column;gap:4px}
.ifield label{font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:0.8px}
.ifield input{width:110px}

/* Badges */
.badge{border-radius:6px;padding:2px 7px;font-weight:700;font-size:12px;display:inline-block;border:1px solid}
.badge.pos{color:#22c55e;background:rgba(34,197,94,0.12);border-color:#22c55e33}
.badge.neg{color:#ef4444;background:rgba(239,68,68,0.12);border-color:#ef444433}
.dim{color:#4b5563}
.muted{color:#94a3b8;font-size:13px}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:990;display:flex;align-items:flex-end;justify-content:center}
.modal-box{background:#1a1f2e;border:1px solid #2a2f3e;border-radius:16px 16px 0 0;padding:20px 16px;width:100%;max-width:500px}
.modal-title{font-size:13px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
.modal-info{background:#131720;border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:13px;color:#e8eaf0}
.modal-info .mi-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:4px}
.modal-info .mi-row:last-child{margin-bottom:0}
.modal-info .ml{font-size:10px;color:#6b7280;text-transform:uppercase}
.modal-info .mv{color:#e8eaf0;font-weight:600}
.modal-btns{display:flex;gap:8px;flex-wrap:wrap}
.modal-btns button{flex:1;min-width:80px}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#22c55e;color:#fff;padding:10px 20px;border-radius:10px;font-weight:600;font-size:14px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="header">
  <div class="title-row"><span style="font-size:24px">📈</span><h1>Mein Depot</h1></div>
  <p class="subtitle">Aktien verwalten · Kurse aktualisieren · Gewinne im Blick</p>
</div>

<div class="wrap">

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="toolbar-row" style="border-bottom:none">
      <div class="toolbar-group">
        <button class="btn-tool btn-xlsx" onclick="document.getElementById('xlsx-input').click()">📥 Excel</button>
        <input type="file" id="xlsx-input" accept=".xlsx,.xls" style="display:none" onchange="importXlsx(this)"/>
        <input type="file" id="json-input" accept=".json" style="display:none"/>
        <button id="btn-lesen-a" class="btn-tool btn-json-imp" onclick="lesenSlot('a')">📂 Lesen A</button>
        <button id="btn-lesen-b" class="btn-tool btn-json-imp" onclick="lesenSlot('b')">📂 Lesen B</button>
        <button class="btn-tool btn-json-exp" onclick="speichernSlot('a')">💾 Speichern A</button>
        <button class="btn-tool btn-json-exp" onclick="speichernSlot('b')">💾 Speichern B</button>
      </div>
    </div>
  </div>

  <div id="summary"></div>
  <div id="add-form"></div>
  <div id="edit-panel"></div>
</div>

<div class="toast" id="toast"></div>
<div id="hist-modal" style="display:none"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
let positions=[], sold=[], currentPrices={}, expandedId=null;

// ---------- helpers ----------
function num(s){return Number(String(s||0).replace(",","."))}
function cur(v){return new Intl.NumberFormat("de-DE",{style:"currency",currency:"EUR"}).format(v)}
function pct(v){return(v>=0?"+":"")+v.toFixed(2).replace(".",",")+"%"}
function fdate(d){return d?new Date(d).toLocaleDateString("de-DE"):"—"}
function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML}
function badge(v,t){return`<span class="badge ${v>=0?"pos":"neg"}">${t}</span>`}
function toast(msg,ok=true){const el=document.getElementById("toast");el.textContent=msg;el.style.background=ok?"#22c55e":"#ef4444";el.classList.add("show");setTimeout(()=>el.classList.remove("show"),2500)}

function getGewinn(pos){
  const e=currentPrices[String(pos.id)];
  if(!e)return null;
  const k=typeof e.kurs==="number"?e.kurs:num(e.kurs);
  if(!k||isNaN(k)||k<=0)return null;
  return{kurs:k,diff:(k-pos.preis)*pos.stuecke,pct:((k-pos.preis)/pos.preis)*100,updatedAt:e.updatedAt};
}

// ---------- Excel Import ----------
function importXlsx(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:"array",cellDates:true});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,dateNF:"yyyy-mm-dd"});
      const posMap={};
      for(const row of rows){
        if(!row[0]||!row[1]||!row[3]||!row[4])continue;
        let datum=row[0];
        if(typeof datum==="number"){const d=new Date(Math.round((datum-25569)*86400*1000));datum=d.toISOString().slice(0,10);}
        else if(typeof datum==="string"){const parts=datum.split(".");if(parts.length===3)datum=`${parts[2]}-${parts[1].padStart(2,"0")}-${parts[0].padStart(2,"0")}`;else datum=datum.slice(0,10);}
        else if(datum instanceof Date){datum=datum.toISOString().slice(0,10);}
        const name=String(row[1]).trim();
        const wkn=String(row[2]||"").trim().toUpperCase();
        const anzahl=parseFloat(String(row[3]).replace(",","."));
        const kursRaw=parseFloat(String(row[4]).replace(",","."));
        const kurs=Math.abs(kursRaw);
        if(!wkn||wkn==="#N/A"||isNaN(anzahl)||isNaN(kurs))continue;
        if(!posMap[wkn]){posMap[wkn]={id:Date.now()+Math.random(),name,wkn,stuecke:0,totalCost:0,preis:0,datum,history:[]};}
        const p=posMap[wkn];
        p.name=name;
        if(anzahl>0){p.totalCost+=kurs*anzahl;p.stuecke+=anzahl;p.history.push({type:"kauf",stuecke:Math.round(anzahl),kurs,datum});}
        else{const vkStuecke=Math.abs(anzahl);const gewinnJe=(kurs-p.preis)*vkStuecke;const gewinnPct=p.preis>0?((kurs-p.preis)/p.preis)*100:0;sold.push({id:p.id,name:p.name,wkn:p.wkn,preis:p.preis,datum:p.datum,stueckeVerkauft:Math.round(vkStuecke),verkaufspreis:kurs,verkaufDatum:datum,gewinnJe,gewinnPct});p.stuecke-=vkStuecke;p.history.push({type:"vk",stuecke:Math.round(vkStuecke),kurs,datum,gewinnJe,gewinnPct});}
        if(p.stuecke>0)p.preis=p.totalCost/p.stuecke;
      }
      positions=Object.values(posMap).filter(p=>p.stuecke>0.001).map(p=>({...p,stuecke:Math.round(p.stuecke),preis:Math.round(p.preis*10000)/10000}));
      currentPrices={};
      autoSave();
      toast(`✅ ${positions.length} Positionen importiert`);
      render();
    }catch(err){console.error(err);toast("❌ Import fehlgeschlagen: "+err.message,false);}
    input.value="";
  };
  reader.readAsArrayBuffer(file);
}

// ---------- Lesen / Speichern A & B ----------
function lesenSlot(slot){
  const input=document.getElementById("json-input");
  input.onchange=function(){
    const file=input.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=function(e){
      try{
        const d=JSON.parse(e.target.result);
        positions=d.positions||[];
        sold=d.sold||[];
        currentPrices=d.currentPrices||{};
        // Dateinamen im Button anzeigen
        const btnA=document.getElementById("btn-lesen-a");
        const btnB=document.getElementById("btn-lesen-b");
        if(slot==='a'){
          if(btnA)btnA.innerHTML=`📂 <span style="color:#22c55e">✓ ${file.name}</span>`;
          if(btnB)btnB.innerHTML=`📂 Lesen B`;
        } else {
          if(btnB)btnB.innerHTML=`📂 <span style="color:#22c55e">✓ ${file.name}</span>`;
          if(btnA)btnA.innerHTML=`📂 Lesen A`;
        }
        render();
        toast(`✅ ${file.name} geladen (${positions.length} Positionen)`);
      }catch(err){toast("❌ Fehler: "+err.message,false);}
      input.value="";
    };
    reader.readAsText(file);
  };
  input.click();
}

function speichernSlot(slot){
  if(!positions.length){toast("Keine Daten zum Speichern",false);return;}
  const other=slot==='a'?'b':'a';
  // Datei herunterladen
  const data=JSON.stringify({positions,sold,currentPrices},null,2);
  const blob=new Blob([data],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="daten-"+slot+".json";
  a.click();
  toast(`💾 daten-${slot}.json gespeichert — bitte daten-${other}.json manuell löschen`);
}

function autoSave(){}
function exportJson(){}
function importJson(){}
function switchSlot(){}
function updateSlotButtons(){}



// ---------- Position hinzufügen ----------
function toggleAddForm(open){
  const el=document.getElementById("add-form");
  if(!open){el.innerHTML="";return;}
  el.innerHTML=`<div class="add-panel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="font-weight:700;font-size:13px;color:#94a3b8;text-transform:uppercase;letter-spacing:1px">Neue Aktie</span>
      <button onclick="toggleAddForm(false)" style="background:none;border:none;color:#6b7280;font-size:20px;cursor:pointer">×</button>
    </div>
    <div class="form-grid">
      <div class="field"><label>Name</label><input type="text" id="f-name" placeholder="Apple Inc."/><div class="err" id="e-name"></div></div>
      <div class="field"><label>WKN</label><input type="text" id="f-wkn" placeholder="865985"/><div class="err" id="e-wkn"></div></div>
      <div class="field"><label>Stücke</label><input type="text" id="f-stuecke" placeholder="10"/><div class="err" id="e-stuecke"></div></div>
      <div class="field"><label>Kaufpreis (€)</label><input type="text" id="f-preis" placeholder="150,00"/><div class="err" id="e-preis"></div></div>
      <div class="field"><label>Kaufdatum</label><input type="date" id="f-datum"/><div class="err" id="e-datum"></div></div>
      <button class="btn-primary" onclick="addPosition()">Hinzufügen</button>
    </div>
  </div>`;
  setTimeout(()=>document.getElementById("f-name").focus(),50);
}

function addPosition(){
  const n=document.getElementById("f-name").value.trim();
  const w=document.getElementById("f-wkn").value.trim();
  const st=document.getElementById("f-stuecke").value.trim();
  const pr=document.getElementById("f-preis").value.trim();
  const da=document.getElementById("f-datum").value;
  const errs={};
  if(!n)errs.name="Pflichtfeld";
  if(!w)errs.wkn="Pflichtfeld";
  if(!st||isNaN(num(st))||num(st)<=0)errs.stuecke="Positive Zahl";
  if(!pr||isNaN(num(pr))||num(pr)<=0)errs.preis="Positiver Betrag";
  if(!da)errs.datum="Pflichtfeld";
  ["name","wkn","stuecke","preis","datum"].forEach(k=>{
    document.getElementById("f-"+k).classList.toggle("error",!!errs[k]);
    document.getElementById("e-"+k).textContent=errs[k]||"";
  });
  if(Object.keys(errs).length)return;
  const stuecke=num(st),preis=num(pr);
  positions.push({id:Date.now(),name:n,wkn:w.toUpperCase(),stuecke,preis,datum:da,history:[{type:"kauf",stuecke,kurs:preis,datum:da}]});
  toggleAddForm(false);render();autoSave();toast("✅ Position hinzugefügt");
}

// ---------- Name/WKN speichern ----------
function saveNameWkn(id){
  const name=document.getElementById("edit-name-"+id).value.trim();
  const wkn=document.getElementById("edit-wkn-"+id).value.trim();
  if(!name)return;
  positions=positions.map(p=>p.id===id?{...p,name,wkn:wkn.toUpperCase()}:p);
  renderCards();renderEditPanel();autoSave();toast("✅ Gespeichert");
}

// ---------- Kurs aktualisieren ----------
function updateKurs(id,val){
  const sid=String(id);
  const parsed=num(val);
  if(val===""||parsed<=0||isNaN(parsed)){
    delete currentPrices[sid];
  } else {
    currentPrices[sid]={kurs:parsed,updatedAt:new Date().toISOString().slice(0,10)};
  }
  // Karten-Übersicht aktualisieren
  renderCards();
  refreshGewinnDisplay(id);
  refreshHistorie(id);
  // Verzögert speichern damit nicht bei jedem Tastendruck ein Download startet
  clearTimeout(window._saveTimer);
  window._saveTimer=setTimeout(autoSave, 2000);
}

function refreshGewinnDisplay(id){
  const pos=positions.find(p=>p.id===id);
  if(!pos)return;
  const g=getGewinn(pos);
  const el=document.getElementById("gr-"+id);
  const del=document.getElementById("gd-"+id);
  if(!el)return;
  el.innerHTML=g
    ?`<div class="kurs-result-item"><span class="rl">Gewinn €</span>${badge(g.diff,cur(g.diff))}</div>
      <div class="kurs-result-item"><span class="rl">Gewinn %</span>${badge(g.pct,pct(g.pct))}</div>
      <div class="kurs-result-item"><span class="rl">Akt. Wert</span><span class="muted">${cur(g.kurs*pos.stuecke)}</span></div>`
    :`<span class="dim" style="font-size:13px">Kurs eingeben →</span>`;
  if(del)del.textContent=g&&g.updatedAt?"Stand: "+fdate(g.updatedAt):"";
}

// ---------- Transaktion ----------
function doTx(id,type){
  const pos=positions.find(p=>p.id===id);
  const st=num(document.getElementById("tx-stuecke-"+id).value);
  const pr=num(document.getElementById("tx-preis-"+id).value);
  const da=document.getElementById("tx-datum-"+id).value;
  const stEl=document.getElementById("tx-stuecke-"+id);
  const prEl=document.getElementById("tx-preis-"+id);
  const daEl=document.getElementById("tx-datum-"+id);
  let ok=true;
  if(!st||st<=0||(type==="vk"&&st>pos.stuecke)){stEl.classList.add("error");ok=false;}else stEl.classList.remove("error");
  if(!pr||pr<=0){prEl.classList.add("error");ok=false;}else prEl.classList.remove("error");
  if(!da){daEl.classList.add("error");ok=false;}else daEl.classList.remove("error");
  if(!ok)return;
  if(type==="kauf"){
    const total=pos.stuecke+st;
    const avg=(pos.preis*pos.stuecke+pr*st)/total;
    positions=positions.map(p=>p.id===id?{...p,stuecke:total,preis:Math.round(avg*10000)/10000,history:[...(p.history||[]),{type:"kauf",stuecke:st,kurs:pr,datum:da}]}:p);
    toast("✅ Zukauf gebucht");
  }else{
    const gewinnJe=(pr-pos.preis)*st;
    const gewinnPct=((pr-pos.preis)/pos.preis)*100;
    sold.push({...pos,stueckeVerkauft:st,verkaufspreis:pr,verkaufDatum:da,gewinnJe,gewinnPct});
    if(st>=pos.stuecke){positions=positions.filter(p=>p.id!==id);expandedId=null;}
    else positions=positions.map(p=>p.id===id?{...p,stuecke:p.stuecke-st}:p);
    toast("✅ Verkauf gebucht");
  }
  render();autoSave();
}

// ---------- Position entfernen ----------
function removePos(id){
  if(!confirm("Position wirklich entfernen?"))return;
  positions=positions.filter(p=>p.id!==id);
  delete currentPrices[String(id)];
  if(expandedId===id)expandedId=null;
  render();autoSave();toast("Position entfernt");
}

// ---------- Summary öffnet Edit ----------
function openFromSummary(id){
  expandedId=(expandedId===id)?null:id;
  renderCards();renderEditPanel();
  if(expandedId===id){
    setTimeout(()=>{
      document.getElementById("edit-panel").scrollIntoView({behavior:"smooth",block:"start"});
      setTimeout(()=>{const el=document.getElementById("ki-"+id);if(el)el.focus();},200);
    },30);
  }
}

// ---------- Historie Eintrag bearbeiten ----------
function openHistModal(posId, entryIdx, entryType){
  const pos=positions.find(p=>p.id===posId);
  if(!pos)return;

  let entry, isSold=false, soldIdx=-1;
  if(entryType==='kauf'){
    const kaufEntries=(pos.history||[]).filter(e=>e.type==="kauf");
    entry=kaufEntries[entryIdx];
  } else {
    const vkEntries=sold.filter(e=>e.wkn===pos.wkn);
    soldIdx=sold.findIndex((e,i)=>e.wkn===pos.wkn && sold.filter(s=>s.wkn===pos.wkn).indexOf(e)===entryIdx);
    entry=vkEntries[entryIdx];
    isSold=true;
  }
  if(!entry)return;

  const modal=document.getElementById("hist-modal");
  modal.style.display="";
  modal.innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeHistModal()">
    <div class="modal-box">
      <div class="modal-title">${entryType==='kauf'?'Kauf':'Verkauf'} bearbeiten</div>
      <div class="modal-info">
        <div class="mi-row">
          <span><span class="ml">Datum </span><span class="mv">${fdate(entry.datum)}</span></span>
          <span><span class="ml">Stücke </span><span class="mv">${entry.stuecke}</span></span>
          <span><span class="ml">Kurs </span><span class="mv">${cur(entry.kurs)}</span></span>
          <span><span class="ml">Betrag </span><span class="mv">${cur(entry.kurs*entry.stuecke)}</span></span>
        </div>
      </div>
      <div style="font-size:12px;color:#6b7280;margin-bottom:14px">Was möchtest du tun?</div>
      <div class="modal-btns">
        <button class="btn-red" style="padding:10px" onclick="deleteHistEntry(${posId},${entryIdx},'${entryType}')">🗑 Löschen</button>
        <button class="btn-sm-confirm blue" style="padding:10px" onclick="openEditHistEntry(${posId},${entryIdx},'${entryType}')">✏️ Ändern</button>
        <button onclick="closeHistModal()" style="background:#1e2332;border:1px solid #2a2f3e;border-radius:6px;padding:10px;color:#6b7280;font-size:13px;cursor:pointer;font-weight:600">Abbrechen</button>
      </div>
    </div>
  </div>`;
}

function closeHistModal(){
  const m=document.getElementById("hist-modal");
  m.style.display="none";
  m.innerHTML="";
}

function deleteHistEntry(posId, entryIdx, entryType){
  if(!confirm("Eintrag wirklich löschen?"))return;
  closeHistModal();
  const pos=positions.find(p=>p.id===posId);
  if(!pos)return;

  if(entryType==='kauf'){
    const kaufEntries=pos.history.filter(e=>e.type==="kauf");
    const toDelete=kaufEntries[entryIdx];
    // Aus history entfernen
    let ki=0;
    pos.history=pos.history.filter(e=>{
      if(e.type!=='kauf')return true;
      return ki++!==entryIdx;
    });
    // Stücke und Durchschnittskurs neu berechnen
    let total=0,cost=0;
    pos.history.filter(e=>e.type==='kauf').forEach(e=>{total+=e.stuecke;cost+=e.kurs*e.stuecke;});
    pos.stuecke=Math.round(total);
    pos.preis=total>0?Math.round(cost/total*10000)/10000:0;
    if(pos.stuecke<=0)positions=positions.filter(p=>p.id!==posId);
  } else {
    // Verkauf aus sold entfernen
    const vkOfPos=sold.filter(e=>e.wkn===pos.wkn);
    const toRemove=vkOfPos[entryIdx];
    const globalIdx=sold.indexOf(toRemove);
    if(globalIdx>=0)sold.splice(globalIdx,1);
    // Stücke zurückbuchen
    pos.stuecke+=toRemove.stueckeVerkauft||0;
  }
  render();
  toast("🗑 Eintrag gelöscht");
}

      </div>

        <button onclick="closeHistModal()" style="background:#1e2332;border:1px solid #2a2f3e;border-radius:6px;padding:10px;color:#6b7280;font-size:13px;cursor:pointer;font-weight:600">Abbrechen</button>
      </div>
    </div>
  </div>`;
}

function saveEditHistEntry(posId, entryIdx, entryType){
  const datum=document.getElementById("edit-h-datum").value;
  const stuecke=num(document.getElementById("edit-h-stuecke").value);
  const kurs=num(document.getElementById("edit-h-kurs").value);
  if(!datum||!stuecke||!kurs){toast("Bitte alle Felder ausfüllen",false);return;}
  closeHistModal();
  const pos=positions.find(p=>p.id===posId);
  if(!pos)return;

  if(entryType==='kauf'){
    let ki=0;
    pos.history=pos.history.map(e=>{
      if(e.type!=='kauf')return e;
      if(ki++===entryIdx)return{...e,datum,stuecke,kurs};
      return e;
    });
    // Durchschnitt neu berechnen
    let total=0,cost=0;
    pos.history.filter(e=>e.type==='kauf').forEach(e=>{total+=e.stuecke;cost+=e.kurs*e.stuecke;});
    pos.stuecke=Math.round(total);
    pos.preis=total>0?Math.round(cost/total*10000)/10000:0;
  } else {
    const vkOfPos=sold.filter(e=>e.wkn===pos.wkn);
    const toEdit=vkOfPos[entryIdx];
    const globalIdx=sold.indexOf(toEdit);
    if(globalIdx>=0){
      sold[globalIdx]={...sold[globalIdx],datum,stuecke:stuecke,verkaufspreis:kurs,
        gewinnJe:(kurs-pos.preis)*stuecke,
        gewinnPct:((kurs-pos.preis)/pos.preis)*100};
    }
  }
  render();
  toast("✅ Eintrag geändert");
}



function buildHistHtml(pos){
  const g=getGewinn(pos);
  const aktKurs=g?g.kurs:null;

  const kaufEntries=(pos.history||[]).filter(e=>e.type==="kauf");
  const vkEntries=sold.filter(e=>e.wkn===pos.wkn).map(v=>({type:"vk",stuecke:v.stueckeVerkauft,kurs:v.verkaufspreis,datum:v.verkaufDatum,gewinnJe:v.gewinnJe,gewinnPct:v.gewinnPct}));
  const allHist=[...kaufEntries,...vkEntries].sort((a,b)=>a.datum.localeCompare(b.datum));

  const fifoLots=[];
  let kaufIdx=0;
  for(const e of allHist){
    if(e.type==="kauf"){fifoLots.push({idx:kaufIdx++,stueckeGekauft:e.stuecke,stueckeNoch:e.stuecke});}
    else{let r=e.stuecke;for(const l of fifoLots){if(r<=0)break;const a=Math.min(l.stueckeNoch,r);l.stueckeNoch-=a;r-=a;}}
  }

  const v1='font-size:13px;color:#e8eaf0;font-weight:700';
  const v2='font-size:12px;color:#94a3b8';
  let fi=0, ki=0, vi=0;

  if(!allHist.length) return `<span class="dim" style="font-size:13px">Keine Einträge</span>`;

  return`<div style="border:1px solid #2a2f3e;border-radius:8px;overflow:hidden">
    <div style="display:grid;grid-template-columns:52px 1fr 1fr 1fr 1fr;background:#0f1117;border-bottom:1px solid #2a2f3e">
      <div style="padding:6px 8px;font-size:9px;color:#6b7280;text-transform:uppercase">Typ<br>Datum</div>
      <div style="padding:6px 8px;font-size:9px;color:#6b7280;text-transform:uppercase">Gekauft<br>Bestand</div>
      <div style="padding:6px 8px;font-size:9px;color:#6b7280;text-transform:uppercase">Kurs<br>Akt. Kurs</div>
      <div style="padding:6px 8px;font-size:9px;color:#6b7280;text-transform:uppercase">Betrag<br>Akt. Wert</div>
      <div style="padding:6px 8px;font-size:9px;color:#6b7280;text-transform:uppercase">Gewinn<br>Prozent</div>
    </div>
    ${allHist.map(e=>{
      if(e.type==="kauf"){
        const lot=fifoLots[fi++];
        const myKi=ki++;
        const imBestand=lot?lot.stueckeNoch:0;
        const vollVerkauft=imBestand===0;
        const bColor=vollVerkauft?"#4b5563":imBestand<e.stuecke?"#f59e0b":"#22c55e";
        let gwBetrag=null,gwPct=null;
        if(aktKurs!==null&&!vollVerkauft){gwBetrag=(aktKurs-e.kurs)*imBestand;gwPct=((aktKurs-e.kurs)/e.kurs)*100;}
        const gColor=gwBetrag!==null?(gwBetrag>=0?"#22c55e":"#ef4444"):"#4b5563";
        return`<div onclick="openHistModal(${pos.id},${myKi},'kauf')" style="display:grid;grid-template-columns:52px 1fr 1fr 1fr 1fr;border-bottom:1px solid #1e2332;${vollVerkauft?"opacity:0.45":""}cursor:pointer" onmouseenter="this.style.background='#1a2235'" onmouseleave="this.style.background=''">
          <div style="padding:7px 8px;border-right:1px solid #1e2332;display:flex;flex-direction:column;justify-content:space-between;gap:4px">
            <span style="background:#1e2d40;color:#60a5fa;font-weight:800;font-size:11px;border-radius:4px;padding:2px 6px;display:inline-block;width:fit-content">K</span>
            <span style="font-size:11px;color:#6b7280;white-space:nowrap">${fdate(e.datum)}</span>
          </div>
          <div style="padding:7px 8px;border-right:1px solid #1e2332;display:flex;flex-direction:column;justify-content:space-between;gap:4px">
            <span style="${v1}">${e.stuecke}</span>
            <span style="font-size:13px;color:${bColor};font-weight:700">${imBestand}${imBestand<e.stuecke&&!vollVerkauft?`<span style="color:#4b5563;font-size:10px;font-weight:400"> /${e.stuecke}</span>`:""}</span>
          </div>
          <div style="padding:7px 8px;border-right:1px solid #1e2332;display:flex;flex-direction:column;justify-content:space-between;gap:4px">
            <span style="${v1}">${cur(e.kurs)}</span>
            <span style="${v2}">${aktKurs!==null&&!vollVerkauft?cur(aktKurs):"—"}</span>
          </div>
          <div style="padding:7px 8px;border-right:1px solid #1e2332;display:flex;flex-direction:column;justify-content:space-between;gap:4px">
            <span style="${v1}">${cur(e.kurs*e.stuecke)}</span>
            <span style="${v2}">${aktKurs!==null&&!vollVerkauft?cur(aktKurs*imBestand):"—"}</span>
          </div>
          <div style="padding:7px 8px;display:flex;flex-direction:column;justify-content:space-between;gap:4px">
            <span style="font-size:13px;color:${gColor};font-weight:700">${gwBetrag!==null?cur(gwBetrag):vollVerkauft?"verk.":"—"}</span>
            <span style="font-size:12px;color:${gColor}">${gwPct!==null?pct(gwPct):"—"}</span>
          </div>
        </div>`;
      } else {
        const myVi=vi++;
        return`<div onclick="openHistModal(${pos.id},${myVi},'vk')" style="display:grid;grid-template-columns:52px 1fr 1fr 1fr 1fr;border-bottom:1px solid #1e2332;background:#150f0a;cursor:pointer" onmouseenter="this.style.background='#1a1410'" onmouseleave="this.style.background='#150f0a'">
          <div style="padding:7px 8px;border-right:1px solid #1e2332;display:flex;flex-direction:column;justify-content:space-between;gap:4px">
            <span style="background:#2d1e10;color:#f97316;font-weight:800;font-size:11px;border-radius:4px;padding:2px 6px;display:inline-block;width:fit-content">V</span>
            <span style="font-size:11px;color:#6b7280;white-space:nowrap">${fdate(e.datum)}</span>
          </div>
          <div style="padding:7px 8px;border-right:1px solid #1e2332;display:flex;flex-direction:column;justify-content:space-between;gap:4px">
            <span style="${v1}">${e.stuecke}</span>
            <span style="${v2}">—</span>
          </div>
          <div style="padding:7px 8px;border-right:1px solid #1e2332;display:flex;flex-direction:column;justify-content:space-between;gap:4px">
            <span style="${v1}">${cur(e.kurs)}</span>
            <span style="${v2}">—</span>
          </div>
          <div style="padding:7px 8px;border-right:1px solid #1e2332;display:flex;flex-direction:column;justify-content:space-between;gap:4px">
            <span style="${v1}">${cur(e.kurs*e.stuecke)}</span>
            <span style="${v2}">—</span>
          </div>
          <div style="padding:7px 8px;display:flex;flex-direction:column;justify-content:space-between;gap:4px">
            <span style="font-size:13px;color:#4b5563">—</span>
            <span style="font-size:12px;color:#4b5563">—</span>
          </div>
        </div>`;
      }
    }).join("")}
  </div>`;
}

function render(){renderCards();renderEditPanel();}

function refreshHistorie(id){
  const el=document.getElementById("hist-"+id);
  if(!el)return;
  const pos=positions.find(p=>p.id===id);
  if(!pos)return;
  el.innerHTML=buildHistHtml(pos);
}

render();
</script>
</body>
</html>
