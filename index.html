<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<title>Mein Depot</title>
<style>
*{box-sizing:border-box}
body{margin:0;min-height:100vh;background:#f0f4f8;color:#1e3a5f;font-family:'Inter','Segoe UI',sans-serif;padding-bottom:60px}
input[type=text],input[type=date]{background:#fff;border:1px solid #bcd0e8;border-radius:8px;padding:9px 12px;color:#1e3a5f;font-size:14px;outline:none;color-scheme:light;width:100%}
input[type=text]:focus,input[type=date]:focus{border-color:#2563eb;box-shadow:0 0 0 2px rgba(37,99,235,0.15)}
input.error{border-color:#ef4444!important}
.header{background:linear-gradient(135deg,#1e3a5f,#1d4ed8);border-bottom:1px solid #bcd0e8;padding:20px 16px 14px}
.title-row{display:flex;align-items:center;gap:10px;margin-bottom:2px}
h1{margin:0;font-size:22px;font-weight:800;color:#fff;letter-spacing:-0.5px}
.subtitle{margin:0;color:#93c5fd;font-size:12px}
.wrap{max-width:1100px;margin:0 auto;padding:16px}

/* Toolbar */
.toolbar{margin-bottom:16px;background:#fff;border:1px solid #bcd0e8;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(30,58,95,0.08)}
.toolbar-row{display:flex;align-items:center;gap:0;border-bottom:1px solid #dbeafe}
.toolbar-row:last-child{border-bottom:none}
.toolbar-group{display:flex;align-items:center;gap:8px;padding:10px 14px;flex:1;flex-wrap:wrap}
.toolbar-group-label{font-size:9px;color:#6b8fb5;text-transform:uppercase;letter-spacing:1px;font-weight:700;padding:0 14px;min-width:52px;border-right:1px solid #dbeafe;align-self:stretch;display:flex;align-items:center}
.btn-tool{border:none;border-radius:7px;padding:7px 13px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:normal;line-height:1.3;text-align:left}
.btn-xlsx{background:#f0fdf4;color:#16a34a;border:1px solid #86efac}
.btn-json-imp{background:#eff6ff;color:#2563eb;border:1px solid #93c5fd}
.btn-json-exp{background:#f5f3ff;color:#7c3aed;border:1px solid #c4b5fd}
.btn-primary{background:linear-gradient(135deg,#2563eb,#1d4ed8);border:none;border-radius:8px;padding:9px 18px;color:#fff;font-weight:700;font-size:13px;cursor:pointer;box-shadow:0 2px 8px rgba(37,99,235,0.25)}
.btn-sm-confirm{background:linear-gradient(135deg,#16a34a,#15803d);border:none;border-radius:6px;padding:8px 14px;color:#fff;font-weight:700;font-size:13px;cursor:pointer}
.btn-sm-confirm.blue{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff}
.btn-red{background:#fef2f2;border:1px solid #fca5a5;border-radius:6px;padding:6px 12px;color:#dc2626;font-size:12px;cursor:pointer;font-weight:600}

/* Summary */
.summary{background:#fff;border:1px solid #bcd0e8;border-radius:14px;overflow:hidden;margin-bottom:16px;box-shadow:0 1px 4px rgba(30,58,95,0.08)}
.summary table{width:100%;border-collapse:collapse}
.summary thead tr{background:#f0f7ff;border-bottom:1px solid #bcd0e8}
.summary th{padding:9px 12px;text-align:left;font-size:10px;color:#6b8fb5;text-transform:uppercase;letter-spacing:0.8px;font-weight:600}
.summary th.r{text-align:right}
.summary td{padding:10px 12px;font-size:13px;border-bottom:1px solid #e8f0f9;color:#1e3a5f}
.summary td.r{text-align:right}
.summary tr:last-child td{border-bottom:none}
.summary .total-row td{border-top:2px solid #bcd0e8;font-weight:700;font-size:14px;background:#f0f7ff}
.summary tr.clickable{cursor:pointer}
.summary tr.clickable:hover td,.summary tr.clickable.sel td{background:#dbeafe}

/* Mobile cards */
.s-cards{display:none}
.s-card{padding:13px 14px;border-bottom:1px solid #e8f0f9;cursor:pointer}
.s-card.sel{background:#dbeafe}
.s-card-name{font-weight:700;font-size:15px;color:#1e3a5f}
.s-card-wkn{font-size:11px;color:#6b8fb5;margin-left:6px}

/* Beide Datenzeilen */
.s-card-row{display:flex;gap:0;margin-top:9px;border:1px solid #bcd0e8;border-radius:8px;overflow:hidden}
.s-card-row.row2{margin-top:6px;border-color:#dbeafe}

/* Einzelne Felder */
.s-card-item{flex:1;display:flex;flex-direction:column;gap:3px;padding:8px 10px;border-right:1px solid #e8f0f9}
.s-card-item:last-child{border-right:none}
.s-card-row .s-card-item{background:#f0f7ff}
.s-card-row.row2 .s-card-item{background:#f8fafc}
.s-card-item .sl{font-size:9px;color:#6b8fb5;text-transform:uppercase;letter-spacing:0.5px;font-weight:600}
.s-card-item .sv{font-size:13px;color:#3b6ea5;font-weight:500}
.s-card-item .sv.bold{color:#1e3a5f;font-weight:700}

.s-total{padding:12px 14px;background:#f0f7ff;border-top:2px solid #bcd0e8}
.s-total-label{font-size:10px;color:#6b8fb5;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-weight:700}

  .summary table,.summary thead,.summary tbody{display:none}
  .s-cards{display:block}
  .inline-form{flex-direction:column}

  .kurs-input-wrap input{width:100%!important}
  .kurs-row{flex-direction:column}
  .form-grid{grid-template-columns:1fr 1fr}

  .form-grid{grid-template-columns:2fr 1fr 1fr 1.3fr 1.3fr auto}
}

/* Add form */
.add-panel{background:#fff;border:1px solid #bcd0e8;border-radius:14px;padding:16px 18px;margin-bottom:16px;box-shadow:0 1px 4px rgba(30,58,95,0.08)}
.form-grid{display:grid;gap:10px;align-items:end}
.field label{display:block;font-size:11px;color:#6b8fb5;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.8px}
.err{color:#dc2626;font-size:11px;margin-top:2px;min-height:14px}

/* Edit panel */
.edit-panel{background:#fff;border:1px solid #bcd0e8;border-radius:14px;overflow:hidden;margin-bottom:16px;box-shadow:0 1px 4px rgba(30,58,95,0.08)}
.expand-inner{padding:0}
.expand-section{margin-bottom:0;border-bottom:1px solid #e8f0f9;padding:14px 16px}
.expand-section:last-child{border-bottom:none}
.section-label{font-size:10px;color:#6b8fb5;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;font-weight:600;border-bottom:1px solid #dbeafe;padding-bottom:5px}
.kurs-row{display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap}
.kurs-input-wrap{flex:0 0 140px}
.kurs-input-wrap label{display:block;font-size:11px;color:#6b8fb5;margin-bottom:4px;text-transform:uppercase}
.kurs-input-wrap input{width:140px}
.kurs-results{display:flex;gap:16px;flex-wrap:wrap;align-items:center}
.kurs-result-item{display:flex;flex-direction:column;gap:2px}
.kurs-result-item .rl{font-size:10px;color:#6b8fb5;text-transform:uppercase}
.kurs-date{font-size:10px;color:#6b8fb5;margin-top:3px}
.inline-form{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end}
.ifield{display:flex;flex-direction:column;gap:4px}
.ifield label{font-size:10px;color:#6b8fb5;text-transform:uppercase;letter-spacing:0.8px}
.ifield input{width:110px}

/* Badges */
.badge{border-radius:6px;padding:2px 7px;font-weight:700;font-size:12px;display:inline-block;border:1px solid}
.badge.pos{color:#15803d;background:rgba(21,128,61,0.08);border-color:#86efac}
.badge.neg{color:#dc2626;background:rgba(220,38,38,0.08);border-color:#fca5a5}
.dim{color:#9bb5cc}
.muted{color:#3b6ea5;font-size:13px}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(30,58,95,0.5);z-index:990;display:flex;align-items:flex-end;justify-content:center}
.modal-box{background:#fff;border:1px solid #bcd0e8;border-radius:16px 16px 0 0;padding:20px 16px;width:100%;max-width:500px;box-shadow:0 -4px 20px rgba(30,58,95,0.15)}
.modal-title{font-size:13px;font-weight:700;color:#6b8fb5;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
.modal-info{background:#f0f7ff;border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:13px;color:#1e3a5f}
.modal-info .mi-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:4px}
.modal-info .mi-row:last-child{margin-bottom:0}
.modal-info .ml{font-size:10px;color:#6b8fb5;text-transform:uppercase}
.modal-info .mv{color:#1e3a5f;font-weight:600}
.modal-btns{display:flex;gap:8px;flex-wrap:wrap}
.modal-btns button{flex:1;min-width:80px}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#4ade80;color:#fff;padding:10px 20px;border-radius:10px;font-weight:600;font-size:14px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="header">
  <div class="title-row"><span style="font-size:24px">📈</span><h1>Aktienübersicht</h1></div>
</div>

<div class="wrap">

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="toolbar-row" style="border-bottom:none">
      <div class="toolbar-group">
        <button class="btn-tool btn-xlsx" onclick="document.getElementById('xlsx-input').click()">📥 Excel</button>
        <input type="file" id="xlsx-input" accept=".xlsx,.xls" style="display:none" onchange="importXlsx(this)"/>
        <input type="file" id="json-input" accept=".json" style="display:none" multiple/>
        <button id="btn-laden" class="btn-tool btn-json-imp" onclick="lesenAuto()">📂 Laden</button>
        <button id="btn-sichern" class="btn-tool btn-json-exp" onclick="sichern()">💾 Sichern</button>
      </div>
    </div>
  </div>

  <div id="summary"></div>
  <div id="add-form"></div>
  <div id="edit-panel"></div>
</div>

<div class="toast" id="toast"></div>
<div id="hist-modal" style="display:none"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
let positions=[], sold=[], currentPrices={}, expandedId=null;

// ---------- helpers ----------
function num(s){return Number(String(s||0).replace(",","."))}
function num2(v){return new Intl.NumberFormat("de-DE",{minimumFractionDigits:2,maximumFractionDigits:2}).format(v)}
function cur(v){return new Intl.NumberFormat("de-DE",{style:"currency",currency:"EUR"}).format(v)}
function pct(v){return(v>=0?"+":"")+v.toFixed(2).replace(".",",")+"%"}
function fdate(d){
  if(!d)return"—";
  const dt=new Date(d);
  const dd=String(dt.getDate()).padStart(2,"0");
  const mm=String(dt.getMonth()+1).padStart(2,"0");
  const jj=String(dt.getFullYear()).slice(2);
  return`${dd}.${mm}.${jj}`;
}
function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML}
function badge(v,t){return`<span class="badge ${v>=0?"pos":"neg"}">${t}</span>`}
function toast(msg,ok=true){const el=document.getElementById("toast");el.textContent=msg;el.style.background=ok?"#4ade80":"#f87171";el.classList.add("show");setTimeout(()=>el.classList.remove("show"),2500)}

function getGewinn(pos){
  const e=currentPrices[String(pos.id)];
  if(!e)return null;
  const k=typeof e.kurs==="number"?e.kurs:num(e.kurs);
  if(!k||isNaN(k)||k<=0)return null;
  return{kurs:k,diff:(k-pos.preis)*pos.stuecke,pct:((k-pos.preis)/pos.preis)*100,updatedAt:e.updatedAt};
}

// ---------- Excel Import ----------
function importXlsx(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:"array",cellDates:true});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,dateNF:"yyyy-mm-dd"});
      const posMap={};
      for(const row of rows){
        if(!row[0]||!row[1]||!row[3]||!row[4])continue;
        let datum=row[0];
        if(typeof datum==="number"){const d=new Date(Math.round((datum-25569)*86400*1000));datum=d.toISOString().slice(0,10);}
        else if(typeof datum==="string"){const parts=datum.split(".");if(parts.length===3)datum=`${parts[2]}-${parts[1].padStart(2,"0")}-${parts[0].padStart(2,"0")}`;else datum=datum.slice(0,10);}
        else if(datum instanceof Date){datum=datum.toISOString().slice(0,10);}
        const name=String(row[1]).trim();
        const wkn=String(row[2]||"").trim().toUpperCase();
        const anzahl=parseFloat(String(row[3]).replace(",","."));
        const kursRaw=parseFloat(String(row[4]).replace(",","."));
        const kurs=Math.abs(kursRaw);
        if(!wkn||wkn==="#N/A"||isNaN(anzahl)||isNaN(kurs))continue;
        if(!posMap[wkn]){posMap[wkn]={id:Date.now()+Math.random(),name,wkn,stuecke:0,totalCost:0,preis:0,datum,history:[]};}
        const p=posMap[wkn];
        p.name=name;
        if(anzahl>0){p.totalCost+=kurs*anzahl;p.stuecke+=anzahl;p.history.push({type:"kauf",stuecke:Math.round(anzahl),kurs,datum});}
        else{const vkStuecke=Math.abs(anzahl);const gewinnJe=(kurs-p.preis)*vkStuecke;const gewinnPct=p.preis>0?((kurs-p.preis)/p.preis)*100:0;sold.push({id:p.id,name:p.name,wkn:p.wkn,preis:p.preis,datum:p.datum,stueckeVerkauft:Math.round(vkStuecke),verkaufspreis:kurs,verkaufDatum:datum,gewinnJe,gewinnPct});p.stuecke-=vkStuecke;p.history.push({type:"vk",stuecke:Math.round(vkStuecke),kurs,datum,gewinnJe,gewinnPct});}
        if(p.stuecke>0)p.preis=p.totalCost/p.stuecke;
      }
      positions=Object.values(posMap).filter(p=>p.stuecke>0.001).map(p=>({...p,stuecke:Math.round(p.stuecke),preis:Math.round(p.preis*10000)/10000}));
      currentPrices={};
      autoSave();
      toast(`✅ ${positions.length} Positionen importiert`);
      render();
    }catch(err){console.error(err);toast("❌ Import fehlgeschlagen: "+err.message,false);}
    input.value="";
  };
  reader.readAsArrayBuffer(file);
}

// ---------- Lesen / Speichern A & B ----------
let loadedSlot=null;

function slotDateKey(slot){return"depot_slot_date_"+slot;}

function saveSlotDate(slot,isoDate){
  localStorage.setItem(slotDateKey(slot),isoDate);
}

function getSlotDate(slot){
  return localStorage.getItem(slotDateKey(slot))||null;
}

function formatDate(iso){
  if(!iso)return null;
  return new Date(iso).toLocaleString("de-DE",{day:"2-digit",month:"2-digit",year:"2-digit",hour:"2-digit",minute:"2-digit"});
}

function updateLesenButton(slot, isoDate){
  const btn=document.getElementById("btn-lesen-"+slot);
  if(!btn)return;
  const d=formatDate(isoDate);
  btn.innerHTML=d
    ?`📂 Lesen ${slot.toUpperCase()}<br><span style="font-size:10px;color:#15803d;font-weight:400">✓ ${d}</span>`
    :`📂 Lesen ${slot.toUpperCase()}`;
}

function updateSpeichernButton(slot, isoDate){
  const btn=document.getElementById("btn-speichern-"+slot);
  if(!btn)return;
  const d=formatDate(isoDate);
  btn.innerHTML=d
    ?`💾 Speichern ${slot.toUpperCase()}<br><span style="font-size:10px;color:#a78bfa;font-weight:400">${d}</span>`
    :`💾 Speichern ${slot.toUpperCase()}`;
}

function restoreButtonDates(){
  ['a','b'].forEach(slot=>{
    const d=getSlotDate(slot);
    if(d) updateLesenButton(slot, d);
  });
}

function lesenAuto(){
  const input=document.getElementById("json-input");
  input.onchange=function(){
    const files=Array.from(input.files);
    if(!files.length)return;
    const reads=files.map(file=>new Promise((resolve,reject)=>{
      const reader=new FileReader();
      reader.onload=e=>{
        try{const d=JSON.parse(e.target.result);resolve({file,d,savedAt:d.savedAt?new Date(d.savedAt):new Date(0)});}
        catch(err){reject(err);}
      };
      reader.readAsText(file);
    }));
    Promise.all(reads).then(results=>{
      results.sort((a,b)=>b.savedAt-a.savedAt);
      const newest=results[0];
      positions=newest.d.positions||[];
      sold=newest.d.sold||[];
      currentPrices=newest.d.currentPrices||{};
      const iso=newest.d.savedAt||new Date().toISOString();
      saveSlotDate('a',iso);
      const btn=document.getElementById("btn-laden");
      if(btn)btn.innerHTML=`📂 Laden<br><span style="font-size:10px;color:#15803d;font-weight:400">✓ ${newest.file.name}</span>`;
      render();
      let msg=`✅ ${newest.file.name} geladen`;
      if(results.length>1)msg+=` · ${results.slice(1).map(r=>r.file.name).join(", ")} ignoriert`;
      toast(msg);
    }).catch(err=>toast("❌ Fehler: "+err.message,false));
    input.value="";
  };
  input.click();
}

function sichern(){
  if(!positions.length){toast("Keine Daten zum Speichern",false);return;}
  const now=new Date();
  const iso=now.toISOString();
  // Dateiname: JJJJ.MM.TT.json
  const name=`Uebst-${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,"0")}.${String(now.getDate()).padStart(2,"0")}.json`;
  const data=JSON.stringify({positions,sold,currentPrices,savedAt:iso},null,2);
  const blob=new Blob([data],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=name;
  a.click();
  saveSlotDate('a',iso);
  const btn=document.getElementById("btn-sichern");
  const d=formatDate(iso);
  if(btn)btn.innerHTML=`💾 Sichern<br><span style="font-size:10px;color:#a78bfa;font-weight:400">${d}</span>`;
  toast(`💾 ${name} gespeichert`);
}

// Alte Funktionen — nicht mehr benötigt
function speichernSlot(slot){sichern();}
function lesenSlot(slot){lesenAuto();}

function tryOpenFileManager(){
  // Verschiedene URL-Schemes probieren — eines davon klappt je nach Gerät/App
  const schemes=[
    "intent://com.android.documentsui/.files.FilesActivity#Intent;scheme=android-app;end",
    "content://com.android.externalstorage.documents/root/primary",
    "com.google.android.apps.nbu.files",
    "file:///sdcard/Download/",
    "downloads:",
  ];
  // Versuche nacheinander über <a href>
  let tried=0;
  function tryNext(){
    if(tried>=schemes.length)return;
    const a=document.createElement("a");
    a.href=schemes[tried++];
    a.target="_blank";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }
  tryNext();
  // Als Fallback: direkt navigieren
  setTimeout(()=>{ try{window.location.href="file:///sdcard/Download/";}catch(e){} },300);
  toast("📁 Versuche Datei-Manager zu öffnen...");
}

function openDownloads(){tryOpenFileManager();}
function exportJson(){}
function importJson(){}
function switchSlot(){}
function updateSlotButtons(){}



// ---------- Position hinzufügen ----------
function toggleAddForm(open){
  const el=document.getElementById("add-form");
  if(!open){el.innerHTML="";return;}
  el.innerHTML=`<div class="add-panel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="font-weight:700;font-size:13px;color:#3b6ea5;text-transform:uppercase;letter-spacing:1px">Neue Aktie</span>
      <button onclick="toggleAddForm(false)" style="background:none;border:none;color:#6b8fb5;font-size:20px;cursor:pointer">×</button>
    </div>
    <div class="form-grid">
      <div class="field"><label>Name</label><input type="text" id="f-name" placeholder="Apple Inc."/><div class="err" id="e-name"></div></div>
      <div class="field"><label>WKN</label><input type="text" id="f-wkn" placeholder="865985"/><div class="err" id="e-wkn"></div></div>
      <div class="field"><label>Stücke</label><input type="text" id="f-stuecke" placeholder="10"/><div class="err" id="e-stuecke"></div></div>
      <div class="field"><label>Kaufpreis (€)</label><input type="text" id="f-preis" placeholder="150,00"/><div class="err" id="e-preis"></div></div>
      <div class="field"><label>Kaufdatum</label><input type="date" id="f-datum"/><div class="err" id="e-datum"></div></div>
      <button class="btn-primary" onclick="addPosition()">Hinzufügen</button>
    </div>
  </div>`;
  setTimeout(()=>document.getElementById("f-name").focus(),50);
}

function addPosition(){
  const n=document.getElementById("f-name").value.trim();
  const w=document.getElementById("f-wkn").value.trim();
  const st=document.getElementById("f-stuecke").value.trim();
  const pr=document.getElementById("f-preis").value.trim();
  const da=document.getElementById("f-datum").value;
  const errs={};
  if(!n)errs.name="Pflichtfeld";
  if(!w)errs.wkn="Pflichtfeld";
  if(!st||isNaN(num(st))||num(st)<=0)errs.stuecke="Positive Zahl";
  if(!pr||isNaN(num(pr))||num(pr)<=0)errs.preis="Positiver Betrag";
  if(!da)errs.datum="Pflichtfeld";
  ["name","wkn","stuecke","preis","datum"].forEach(k=>{
    document.getElementById("f-"+k).classList.toggle("error",!!errs[k]);
    document.getElementById("e-"+k).textContent=errs[k]||"";
  });
  if(Object.keys(errs).length)return;
  const stuecke=num(st),preis=num(pr);
  positions.push({id:Date.now(),name:n,wkn:w.toUpperCase(),stuecke,preis,datum:da,history:[{type:"kauf",stuecke,kurs:preis,datum:da}]});
  toggleAddForm(false);render();autoSave();toast("✅ Position hinzugefügt");
}

function saveNameWkn(id){

  if(!name)return;

// ---------- Kurs aktualisieren ----------
function updateKurs(id,val){
  const sid=String(id);
  const parsed=num(val);
  if(val===""||parsed<=0||isNaN(parsed)){
    delete currentPrices[sid];
  } else {
    currentPrices[sid]={kurs:parsed,updatedAt:new Date().toISOString().slice(0,10)};
  }
  // Karten-Übersicht aktualisieren
  renderCards();
  refreshGewinnDisplay(id);
  refreshHistorie(id);
  // Verzögert speichern damit nicht bei jedem Tastendruck ein Download startet
  clearTimeout(window._saveTimer);
  window._saveTimer=setTimeout(autoSave, 2000);
}

function refreshGewinnDisplay(id){
  const pos=positions.find(p=>p.id===id);
  if(!pos)return;
  const g=getGewinn(pos);
  const el=document.getElementById("gr-"+id);
  const del=document.getElementById("gd-"+id);
  if(!el)return;
  el.innerHTML=g
    ?`<div class="kurs-result-item"><span class="rl">Gewinn €</span>${badge(g.diff,cur(g.diff))}</div>
      <div class="kurs-result-item"><span class="rl">Gewinn %</span>${badge(g.pct,pct(g.pct))}</div>
      <div class="kurs-result-item"><span class="rl">Akt. Wert</span><span class="muted">${cur(g.kurs*pos.stuecke)}</span></div>`
    :`<span class="dim" style="font-size:13px">Kurs eingeben →</span>`;
  if(del)del.textContent=g&&g.updatedAt?"Stand: "+fdate(g.updatedAt):"";
}

// ---------- Transaktion ----------
function doTx(id,type){
  const pos=positions.find(p=>p.id===id);
  const st=num(document.getElementById("tx-stuecke-"+id).value);
  const pr=num(document.getElementById("tx-preis-"+id).value);
  const da=document.getElementById("tx-datum-"+id).value;
  const stEl=document.getElementById("tx-stuecke-"+id);
  const prEl=document.getElementById("tx-preis-"+id);
  const daEl=document.getElementById("tx-datum-"+id);
  let ok=true;
  if(!st||st<=0||(type==="vk"&&st>pos.stuecke)){stEl.classList.add("error");ok=false;}else stEl.classList.remove("error");
  if(!pr||pr<=0){prEl.classList.add("error");ok=false;}else prEl.classList.remove("error");
  if(!da){daEl.classList.add("error");ok=false;}else daEl.classList.remove("error");
  if(!ok)return;
  if(type==="kauf"){
    const total=pos.stuecke+st;
    const avg=(pos.preis*pos.stuecke+pr*st)/total;
    positions=positions.map(p=>p.id===id?{...p,stuecke:total,preis:Math.round(avg*10000)/10000,history:[...(p.history||[]),{type:"kauf",stuecke:st,kurs:pr,datum:da}]}:p);
    toast("✅ Zukauf gebucht");
  }else{
    // FIFO: älteste Kaufchargen zuerst aufbrauchen
    const kaufLots=(pos.history||[])
      .filter(e=>e.type==="kauf")
      .map(e=>({...e})); // Kopie damit Original nicht verändert wird

    // Bereits verbrauchte Stücke durch frühere Verkäufe abziehen
    const bereitsVerkauft=sold
      .filter(e=>e.wkn===pos.wkn)
      .reduce((sum,e)=>sum+(e.stueckeVerkauft||0),0);
    let skip=bereitsVerkauft;
    for(const lot of kaufLots){
      const abzug=Math.min(lot.stuecke, skip);
      lot.stuecke-=abzug;
      skip-=abzug;
      if(skip<=0)break;
    }

    // Jetzt FIFO für diesen Verkauf berechnen
    let restVk=st;
    let fifoGewinn=0;
    const fifoDetails=[];
    for(const lot of kaufLots){
      if(restVk<=0||lot.stuecke<=0)continue;
      const verbraucht=Math.min(lot.stuecke, restVk);
      const gewinnLot=(pr-lot.kurs)*verbraucht;
      fifoGewinn+=gewinnLot;
      fifoDetails.push({kaufKurs:lot.kurs, stuecke:verbraucht, gewinn:gewinnLot, datum:lot.datum});
      restVk-=verbraucht;
    }
    const fifoGewinnPct=fifoGewinn/((fifoDetails.reduce((s,d)=>s+d.kaufKurs*d.stuecke,0)||1))*100;

    sold.push({
      ...pos,
      stueckeVerkauft:st,
      verkaufspreis:pr,
      verkaufDatum:da,
      gewinnJe:fifoGewinn,
      gewinnPct:fifoGewinnPct,
      fifoDetails
    });
    if(st>=pos.stuecke){positions=positions.filter(p=>p.id!==id);expandedId=null;}
    else positions=positions.map(p=>p.id===id?{...p,stuecke:p.stuecke-st}:p);
    toast("✅ Verkauf gebucht");
  }
  render();autoSave();
}

// ---------- Historie Eintrag bearbeiten ----------
function openHistModal(posId, entryIdx, entryType){
  const pos=positions.find(p=>p.id===posId);
  if(!pos)return;

  let entry, isSold=false, soldIdx=-1;
  if(entryType==='kauf'){
    const kaufEntries=(pos.history||[]).filter(e=>e.type==="kauf");
    entry=kaufEntries[entryIdx];
  } else {
    const vkEntries=sold.filter(e=>e.wkn===pos.wkn);
    soldIdx=sold.findIndex((e,i)=>e.wkn===pos.wkn && sold.filter(s=>s.wkn===pos.wkn).indexOf(e)===entryIdx);
    entry=vkEntries[entryIdx];
    isSold=true;
  }
  if(!entry)return;

  const modal=document.getElementById("hist-modal");
  modal.style.display="";
  modal.innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeHistModal()">
    <div class="modal-box">
      <div class="modal-title">${entryType==='kauf'?'Kauf':'Verkauf'} bearbeiten</div>
      <div class="modal-info">
        <div class="mi-row">
          <span><span class="ml">Datum </span><span class="mv">${fdate(entry.datum)}</span></span>
          <span><span class="ml">Stücke </span><span class="mv">${entry.stuecke}</span></span>
          <span><span class="ml">Kurs </span><span class="mv">${cur(entry.kurs)}</span></span>
          <span><span class="ml">Betrag </span><span class="mv">${cur(entry.kurs*entry.stuecke)}</span></span>
        </div>
      </div>
      <div style="font-size:12px;color:#6b8fb5;margin-bottom:14px">Was möchtest du tun?</div>
      <div class="modal-btns">
        <button class="btn-red" style="padding:10px" onclick="deleteHistEntry(${posId},${entryIdx},'${entryType}')">🗑 Löschen</button>
        <button class="btn-sm-confirm blue" style="padding:10px" onclick="openEditHistEntry(${posId},${entryIdx},'${entryType}')">✏️ Ändern</button>
        <button onclick="closeHistModal()" style="background:#e8f0f9;border:1px solid #bcd0e8;border-radius:6px;padding:10px;color:#6b8fb5;font-size:13px;cursor:pointer;font-weight:600">Abbrechen</button>

function closeHistModal(){
  const m=document.getElementById("hist-modal");
  m.style.display="none";
  m.innerHTML="";
}

function deleteHistEntry(posId, entryIdx, entryType){
  if(!confirm("Eintrag wirklich löschen?"))return;
  closeHistModal();
  const pos=positions.find(p=>p.id===posId);
  if(!pos)return;

  if(entryType==='kauf'){
    const kaufEntries=pos.history.filter(e=>e.type==="kauf");
    const toDelete=kaufEntries[entryIdx];
    // Aus history entfernen
    let ki=0;
    pos.history=pos.history.filter(e=>{
      if(e.type!=='kauf')return true;
      return ki++!==entryIdx;
    });
    // Stücke und Durchschnittskurs neu berechnen
    let total=0,cost=0;
    pos.history.filter(e=>e.type==='kauf').forEach(e=>{total+=e.stuecke;cost+=e.kurs*e.stuecke;});
    pos.stuecke=Math.round(total);
    pos.preis=total>0?Math.round(cost/total*10000)/10000:0;
    if(pos.stuecke<=0)positions=positions.filter(p=>p.id!==posId);
  } else {
    // Verkauf aus sold entfernen
    const vkOfPos=sold.filter(e=>e.wkn===pos.wkn);
    const toRemove=vkOfPos[entryIdx];
    const globalIdx=sold.indexOf(toRemove);
    if(globalIdx>=0)sold.splice(globalIdx,1);
    // Stücke zurückbuchen
    pos.stuecke+=toRemove.stueckeVerkauft||0;
  }
  render();
  toast("🗑 Eintrag gelöscht");
}

  const modal=document.getElementById("hist-modal");

      <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:14px">
        <div><label style="font-size:10px;color:#6b8fb5;text-transform:uppercase;display:block;margin-bottom:4px">Datum</label>
          <input type="date" id="edit-h-datum" value="${entry.datum}" style="background:#f8fafc;border:1px solid #bcd0e8;border-radius:8px;padding:9px 12px;color:#1e3a5f;font-size:14px;width:100%;color-scheme:dark"/></div>
        <div><label style="font-size:10px;color:#6b8fb5;text-transform:uppercase;display:block;margin-bottom:4px">Stücke</label>
          <input type="text" id="edit-h-stuecke" value="${entry.stuecke}" style="background:#f8fafc;border:1px solid #bcd0e8;border-radius:8px;padding:9px 12px;color:#1e3a5f;font-size:14px;width:100%"/></div>
        <div><label style="font-size:10px;color:#6b8fb5;text-transform:uppercase;display:block;margin-bottom:4px">Kurs (€)</label>
          <input type="text" id="edit-h-kurs" value="${String(entry.kurs).replace('.',',')}" style="background:#f8fafc;border:1px solid #bcd0e8;border-radius:8px;padding:9px 12px;color:#1e3a5f;font-size:14px;width:100%"/></div>
      </div>
      <div class="modal-btns">
        <button class="btn-sm-confirm" onclick="saveEditHistEntry(${posId},${entryIdx},'${entryType}')">✅ Speichern</button>
        <button onclick="closeHistModal()" style="background:#e8f0f9;border:1px solid #bcd0e8;border-radius:6px;padding:10px;color:#6b8fb5;font-size:13px;cursor:pointer;font-weight:600">Abbrechen</button>
      </div>
    </div>
  </div>`;
}

function saveEditHistEntry(posId, entryIdx, entryType){
  const datum=document.getElementById("edit-h-datum").value;
  const stuecke=num(document.getElementById("edit-h-stuecke").value);
  const kurs=num(document.getElementById("edit-h-kurs").value);
  if(!datum||!stuecke||!kurs){toast("Bitte alle Felder ausfüllen",false);return;}
  closeHistModal();
  const pos=positions.find(p=>p.id===posId);
  if(!pos)return;

  if(entryType==='kauf'){
    let ki=0;
    pos.history=pos.history.map(e=>{
      if(e.type!=='kauf')return e;
      if(ki++===entryIdx)return{...e,datum,stuecke,kurs};
      return e;
    });
    // Durchschnitt neu berechnen
    let total=0,cost=0;
    pos.history.filter(e=>e.type==='kauf').forEach(e=>{total+=e.stuecke;cost+=e.kurs*e.stuecke;});
    pos.stuecke=Math.round(total);
    pos.preis=total>0?Math.round(cost/total*10000)/10000:0;
  } else {
    const vkOfPos=sold.filter(e=>e.wkn===pos.wkn);
    const toEdit=vkOfPos[entryIdx];
    const globalIdx=sold.indexOf(toEdit);
    if(globalIdx>=0){
      sold[globalIdx]={...sold[globalIdx],datum,stuecke:stuecke,verkaufspreis:kurs,
        gewinnJe:(kurs-pos.preis)*stuecke,
        gewinnPct:((kurs-pos.preis)/pos.preis)*100};
    }
  }
  render();
  toast("✅ Eintrag geändert");
}



function buildHistHtml(pos){
  const g=getGewinn(pos);
  const aktKurs=g?g.kurs:null;

  const kaufEntries=(pos.history||[]).filter(e=>e.type==="kauf");
  const vkEntries=sold.filter(e=>e.wkn===pos.wkn).map(v=>({
    type:"vk",
    stuecke:v.stueckeVerkauft,
    kurs:v.verkaufspreis,
    datum:v.verkaufDatum,
    gewinnJe:v.gewinnJe,
    gewinnPct:v.gewinnPct,
    fifoDetails:v.fifoDetails||null
  }));
  const allHist=[...kaufEntries,...vkEntries].sort((a,b)=>a.datum.localeCompare(b.datum));

  const fifoLots=[];
  let kaufIdx=0;
  for(const e of allHist){
    if(e.type==="kauf"){fifoLots.push({idx:kaufIdx++,stueckeGekauft:e.stuecke,stueckeNoch:e.stuecke});}
    else{let r=e.stuecke;for(const l of fifoLots){if(r<=0)break;const a=Math.min(l.stueckeNoch,r);l.stueckeNoch-=a;r-=a;}}
  }

  const v1='font-size:13px;color:#1e3a5f;font-weight:700';
  const v2='font-size:12px;color:#3b6ea5';
  let fi=0, ki=0, vi=0;

  if(!allHist.length) return `<span class="dim" style="font-size:13px">Keine Einträge</span>`;

  return`<div style="border:1px solid #bcd0e8;border-radius:8px;overflow:hidden">
    <div style="display:grid;grid-template-columns:52px 18% 18% 26% 26%;background:#f0f7ff;border-bottom:1px solid #bcd0e8">
      <div style="padding:5px 6px;font-size:9px;color:#6b8fb5;text-transform:uppercase;line-height:1.4">Datum</div>
      <div style="padding:5px 6px;font-size:9px;color:#6b8fb5;text-transform:uppercase;line-height:1.4">Stück<br>Bestand</div>
      <div style="padding:5px 6px;font-size:9px;color:#6b8fb5;text-transform:uppercase;line-height:1.4">Kurs €<br>Akt. €</div>
      <div style="padding:5px 6px;font-size:9px;color:#6b8fb5;text-transform:uppercase;line-height:1.4">Betrag €<br>Akt. Wert €</div>
      <div style="padding:5px 6px;font-size:9px;color:#6b8fb5;text-transform:uppercase;line-height:1.4">Gewinn €<br>Prozent</div>
    </div>
    ${allHist.map(e=>{
      if(e.type==="kauf"){
        const lot=fifoLots[fi++];
        const myKi=ki++;
        const imBestand=lot?lot.stueckeNoch:0;
        const vollVerkauft=imBestand===0;
        const bColor=vollVerkauft?"#9ca3af":imBestand<e.stuecke?"#d97706":"#16a34a";
        let gwBetrag=null,gwPct=null;
        if(aktKurs!==null&&!vollVerkauft){gwBetrag=(aktKurs-e.kurs)*imBestand;gwPct=((aktKurs-e.kurs)/e.kurs)*100;}
        const gColor=gwBetrag!==null?(gwBetrag>=0?"#16a34a":"#dc2626"):"#9ca3af";
        return`<div onclick="openHistModal(${pos.id},${myKi},'kauf')" style="display:grid;grid-template-columns:52px 18% 18% 26% 26%;border-bottom:1px solid #e8f0f9;${vollVerkauft?"opacity:0.45":""}cursor:pointer" onmouseenter="this.style.background='#dbeafe'" onmouseleave="this.style.background=''">
          <div style="padding:6px 6px;border-right:1px solid #e8f0f9;display:flex;flex-direction:column;justify-content:space-between;gap:3px">
            <span style="background:#eff6ff;color:#2563eb;font-weight:800;font-size:11px;border-radius:4px;padding:2px 5px;display:inline-block">K</span>
            <span style="font-size:11px;color:#6b8fb5;white-space:nowrap;overflow:hidden">${fdate(e.datum)}</span>
          </div>
          <div style="padding:6px 6px;border-right:1px solid #e8f0f9;display:flex;flex-direction:column;justify-content:space-between;gap:3px">
            <span style="${v1}">${e.stuecke}</span>
            <span style="font-size:13px;color:${bColor};font-weight:700">${imBestand}${imBestand<e.stuecke&&!vollVerkauft?`<span style="color:#9ca3af;font-size:10px;font-weight:400">/${e.stuecke}</span>`:""}</span>
          </div>
          <div style="padding:6px 6px;border-right:1px solid #e8f0f9;display:flex;flex-direction:column;justify-content:space-between;gap:3px">
            <span style="${v1}">${num2(e.kurs)}</span>
            <span style="${v2}">${aktKurs!==null&&!vollVerkauft?num2(aktKurs):"—"}</span>
          </div>
          <div style="padding:6px 6px;border-right:1px solid #e8f0f9;display:flex;flex-direction:column;justify-content:space-between;gap:3px">
            <span style="${v1}">${num2(e.kurs*e.stuecke)}</span>
            <span style="${v2}">${aktKurs!==null&&!vollVerkauft?num2(aktKurs*imBestand):"—"}</span>
          </div>
          <div style="padding:6px 6px;display:flex;flex-direction:column;justify-content:space-between;gap:3px">
            <span style="font-size:13px;color:${gColor};font-weight:700">${gwBetrag!==null?num2(gwBetrag):vollVerkauft?"verk.":"—"}</span>
            <span style="font-size:12px;color:${gColor}">${gwPct!==null?pct(gwPct):"—"}</span>
          </div>
        </div>`;
      } else {
        const myVi=vi++;
        const gJ=e.gewinnJe||0;
        const gP=e.gewinnPct||0;
        const gColor=gJ>=0?"#16a34a":"#dc2626";
        const hasFifo=e.fifoDetails&&e.fifoDetails.length>0;
        const fifoTip=hasFifo?e.fifoDetails.map(d=>`${d.stuecke}×${num2(d.kaufKurs)}→${num2(d.gewinn)}`).join(" | "):"";
        return`<div onclick="openHistModal(${pos.id},${myVi},'vk')" style="display:grid;grid-template-columns:52px 18% 18% 26% 26%;border-bottom:1px solid #e8f0f9;background:#fff8f0;cursor:pointer" onmouseenter="this.style.background='#fef3c7'" onmouseleave="this.style.background='#fff8f0'">
          <div style="padding:6px 6px;border-right:1px solid #e8f0f9;display:flex;flex-direction:column;justify-content:space-between;gap:3px">
            <span style="background:#fff7ed;color:#f97316;font-weight:800;font-size:11px;border-radius:4px;padding:2px 5px;display:inline-block;border:1px solid #fed7aa">V</span>
            <span style="font-size:11px;color:#6b8fb5;white-space:nowrap;overflow:hidden">${fdate(e.datum)}</span>
          </div>
          <div style="padding:6px 6px;border-right:1px solid #e8f0f9;display:flex;flex-direction:column;justify-content:space-between;gap:3px">
            <span style="${v1}">${e.stuecke}</span>
            <span style="font-size:10px;color:#6b8fb5">FIFO</span>
          </div>
          <div style="padding:6px 6px;border-right:1px solid #e8f0f9;display:flex;flex-direction:column;justify-content:space-between;gap:3px">
            <span style="${v1}">${num2(e.kurs)}</span>
            <span style="${v2}">—</span>
          </div>
          <div style="padding:6px 6px;border-right:1px solid #e8f0f9;display:flex;flex-direction:column;justify-content:space-between;gap:3px">
            <span style="${v1}">${num2(e.kurs*e.stuecke)}</span>
            <span style="${v2}">—</span>
          </div>
          <div style="padding:6px 6px;display:flex;flex-direction:column;justify-content:space-between;gap:3px" title="${fifoTip}">
            <span style="font-size:13px;color:${gColor};font-weight:700">${num2(gJ)}</span>
            <span style="font-size:12px;color:${gColor}">${pct(gP)}</span>
          </div>
        </div>${hasFifo?`<div style="background:#fef9f0;border-bottom:1px solid #e8f0f9;padding:4px 8px 6px 60px;display:flex;flex-wrap:wrap;gap:6px">
          ${e.fifoDetails.map(d=>`<span style="font-size:10px;color:#6b8fb5;background:#fff;border:1px solid #e8f0f9;border-radius:4px;padding:2px 6px">${d.stuecke}×${num2(d.kaufKurs)} <span style="color:${d.gewinn>=0?"#16a34a":"#dc2626"}">${num2(d.gewinn)}</span></span>`).join("")}
        </div>`:""}`;
      }
    }).join("")}
  </div>`;
}

function render(){renderCards();renderEditPanel();}

function refreshHistorie(id){
  const el=document.getElementById("hist-"+id);
  if(!el)return;
  const pos=positions.find(p=>p.id===id);
  if(!pos)return;
  el.innerHTML=buildHistHtml(pos);
}

// Beim Start gespeicherte Slot-Daten in Buttons anzeigen
restoreButtonDates();
render();
</script>
</body>
